*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#fff;min-height:100vh;font-family:'Cairo','Inter',sans-serif}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#1e293b}::-webkit-scrollbar-thumb{background:#f97316;border-radius:2px}

.fade{animation:fadeIn 0.3s ease-out}
.bounce{animation:bounce 1.1s infinite}
.pulse{animation:pulse 1.5s infinite}
.slide-up{animation:slideUp 0.3s ease-out}
.ring{animation:ring 0.6s ease-in-out}
.notif-ping{animation:ping 1s cubic-bezier(0,0,0.2,1) infinite}

// ─── NOTIFICATION STORE ───────────────────────────────────────
let globalNotifs = [];
let notifListeners = [];
function subscribeNotifs(fn){ notifListeners.push(fn); return ()=>{ notifListeners=notifListeners.filter(f=>f!==fn); }; }
function pushNotif(notif){
  const n = {...notif, id: Date.now(), read: false, time: new Date()};
  globalNotifs = [n, ...globalNotifs];
  notifListeners.forEach(fn=>fn([...globalNotifs]));
  // Browser push notification
  if(Notification.permission==='granted'){
    new Notification('نجدة أوتو', {body: notif.body, icon: '🚗'});
  }
}
function useNotifs(){
  const [notifs, setNotifs] = useState([...globalNotifs]);
  useEffect(()=>subscribeNotifs(setNotifs), []);
  return notifs;
}
